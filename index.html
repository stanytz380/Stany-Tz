<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movie Stream Finder</title>
<style>
body {
  font-family: Arial;
  background: #0d0d0d;
  color: white;
  padding: 20px;
}
input, select, button {
  padding: 10px;
  margin: 5px;
}
.movie {
  border: 1px solid #333;
  padding: 10px;
  margin-top: 10px;
}
img {
  width: 150px;
}
.links a {
  display: block;
  color: cyan;
  margin: 3px 0;
}
</style>
</head>
<body>

<h1>🎬 Movie Stream Finder</h1>

<input type="text" id="search" placeholder="Enter movie name">
<button onclick="searchMovie()">Search</button>

<select onchange="loadCategory(this.value)">
  <option value="">-- Select Category --</option>
  <option value="popular">Popular</option>
  <option value="top_rated">Top Rated</option>
  <option value="now_playing">Now Playing</option>
  <option value="upcoming">Upcoming</option>
  <option value="trending">Trending</option>
</select>

<div id="results"></div>

<script>
const API_KEY = "2e211dfda888f7cc55ce433d743f9bc3";
const BASE = "https://api.themoviedb.org/3";

async function searchMovie() {
  let query = document.getElementById("search").value;
  let res = await fetch(`${BASE}/search/movie?api_key=${API_KEY}&query=${query}`);
  let data = await res.json();
  showMovies(data.results);
}

async function loadCategory(type) {
  let url = "";

  if(type === "trending"){
    url = `${BASE}/trending/movie/week?api_key=${API_KEY}`;
  } else {
    url = `${BASE}/movie/${type}?api_key=${API_KEY}`;
  }

  let res = await fetch(url);
  let data = await res.json();
  showMovies(data.results);
}

function showMovies(movies) {
  let html = "";

  movies.forEach(m => {
    let poster = m.poster_path 
      ? `https://image.tmdb.org/t/p/w500${m.poster_path}` 
      : "";

    html += `
    <div class="movie">
      <h3>${m.title}</h3>
      <img src="${poster}">
      <p>⭐ Rating: ${m.vote_average}</p>
      <p>${m.overview}</p>

      <button onclick="getLinks(${m.id})">Get Stream Links</button>

      <div id="links-${m.id}" class="links"></div>
    </div>
    `;
  });

  document.getElementById("results").innerHTML = html;
}

async function getLinks(id) {

  // Hizi ni SOURCES za streaming (no ads direct)
  let sources = [
    `https://vidsrc.to/embed/movie/${id}`,
    `https://vidsrc.me/embed/movie?tmdb=${id}`,
    `https://multiembed.mov/?video_id=${id}&tmdb=1`
  ];

  let qualities = ["480p", "720p", "1080p"];

  let html = "<h4>🎥 Stream Links:</h4>";

  sources.forEach((src, i) => {
    html += `<a href="${src}" target="_blank">${qualities[i] || "HD"} - Open Player</a>`;
  });

  // Example "direct style links" (fake structure but useful for API expansion)
  html += `<hr><b>Direct Style (Use in player):</b>`;

  html += `
    <a href="https://vidsrc.to/embed/movie/${id}">Embed Link</a>
    <a href="https://vidsrc.me/embed/movie?tmdb=${id}">Alt Embed</a>
  `;

  document.getElementById(`links-${id}`).innerHTML = html;
}
</script>

</body>
</html>
