<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>STANY NETFLIX PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { background:#0f0f0f; color:white; font-family:Arial; }
h1,h2 { margin-left:10px; }

.section { display:flex; overflow-x:auto; padding:10px; }

.movie {
  min-width:150px;
  margin-right:10px;
  cursor:pointer;
}

.movie img { width:100%; border-radius:10px; }

#player iframe {
  width:100%;
  height:300px;
  border:none;
  border-radius:10px;
}

select, button, input {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

</style>
</head>

<body>

<h1>🎬 STANY NETFLIX PRO</h1>

<input id="search" placeholder="Search movie or series...">
<button onclick="search()">Search</button>
<button onclick="showFavorites()">❤️ Favorites</button>

<div id="content"></div>
<div id="player"></div>

<script>

const API_KEY = "2e211dfda888f7cc55ce433d743f9bc3";
const IMG = "https://image.tmdb.org/t/p/w500";

function saveFav(item){
  let favs = JSON.parse(localStorage.getItem("favs") || "[]");
  favs.push(item);
  localStorage.setItem("favs", JSON.stringify(favs));
  alert("Saved ❤️");
}

function showFavorites(){
  const favs = JSON.parse(localStorage.getItem("favs") || "[]");
  document.getElementById("content").innerHTML = "<h2>❤️ Favorites</h2>";

  favs.forEach(item=>{
    createCard(item, item.type);
  });
}

function createCard(item, type){
  const div = document.createElement("div");
  div.className="movie";

  div.innerHTML=`
    <img src="${IMG + item.poster}">
    <p>${item.title}</p>
  `;

  div.onclick = ()=> play(item.id, type);
  document.getElementById("content").appendChild(div);
}

async function fetchCategory(title, url, type="movie"){
  const res = await fetch(url);
  const data = await res.json();

  const section = document.createElement("div");
  section.innerHTML = `<h2>${title}</h2><div class="section"></div>`;
  const container = section.querySelector(".section");

  data.results.forEach(item=>{
    const div = document.createElement("div");
    div.className="movie";

    div.innerHTML=`
      <img src="${IMG + item.poster_path}">
      <p>${item.title || item.name}</p>
    `;

    div.onclick = ()=>{
      play(item.id, item.media_type || type);
      saveFav({
        id:item.id,
        title:item.title||item.name,
        poster:item.poster_path,
        type:item.media_type||type
      });
    };

    container.appendChild(div);
  });

  document.getElementById("content").appendChild(section);
}

function play(id, type){
  if(type==="tv"){
    loadSeries(id);
  }else{
    document.getElementById("player").innerHTML = `
      <h2>Now Playing</h2>
      <iframe src="https://vidsrc.to/embed/movie/${id}" allowfullscreen></iframe>
    `;
  }
}

async function loadSeries(id){
  const res = await fetch(
    `https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}`
  );
  const data = await res.json();

  let seasons = data.seasons.map(s =>
    `<option value="${s.season_number}">Season ${s.season_number}</option>`
  ).join("");

  document.getElementById("player").innerHTML = `
    <h2>${data.name}</h2>

    <select id="season">${seasons}</select>
    <select id="episode"></select>

    <button onclick="playEpisode(${id})">▶️ Play</button>

    <iframe id="frame"></iframe>
  `;

  loadEpisodes(id);
}

async function loadEpisodes(id){
  const season = document.getElementById("season").value;

  const res = await fetch(
    `https://api.themoviedb.org/3/tv/${id}/season/${season}?api_key=${API_KEY}`
  );

  const data = await res.json();

  let eps = data.episodes.map(e =>
    `<option value="${e.episode_number}">Ep ${e.episode_number}</option>`
  ).join("");

  document.getElementById("episode").innerHTML = eps;
}

function playEpisode(id){
  const s = document.getElementById("season").value;
  const e = document.getElementById("episode").value;

  document.getElementById("frame").src =
    `https://vidsrc.to/embed/tv/${id}/${s}/${e}`;
}

document.addEventListener("change", e=>{
  if(e.target.id==="season"){
    loadEpisodes();
  }
});

async function loadHome(){
  document.getElementById("content").innerHTML="";

  fetchCategory("🔥 Trending",
    `https://api.themoviedb.org/3/trending/all/day?api_key=${API_KEY}`);

  fetchCategory("⭐ Popular Movies",
    `https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}`);

  fetchCategory("🆕 Now Playing",
    `https://api.themoviedb.org/3/movie/now_playing?api_key=${API_KEY}`);

  fetchCategory("🏆 Top Rated",
    `https://api.themoviedb.org/3/movie/top_rated?api_key=${API_KEY}`);

  fetchCategory("📺 TV Series",
    `https://api.themoviedb.org/3/tv/popular?api_key=${API_KEY}`, "tv");
}

async function search(){
  const q = document.getElementById("search").value;

  document.getElementById("content").innerHTML="";

  fetchCategory("🔍 Results",
    `https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}`);
}

loadHome();

</script>

</body>
</html>
