<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STANY Movie Stream System</title>

<style>
body {
  background: #0b0b0b;
  color: #fff;
  font-family: Arial;
  padding: 15px;
}

h2 {
  text-align: center;
}

.section {
  margin-top: 25px;
}

.movies {
  display: flex;
  overflow-x: auto;
  gap: 10px;
}

.movie {
  min-width: 140px;
  background: #1a1a1a;
  border-radius: 10px;
  padding: 8px;
  cursor: pointer;
}

.movie img {
  width: 100%;
  border-radius: 10px;
}

.movie p {
  font-size: 12px;
  text-align: center;
}

input {
  width: 70%;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #00ff99;
  cursor: pointer;
}

.links {
  margin-top: 20px;
}

.link-box {
  background: #1c1c1c;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  word-break: break-all;
}

iframe {
  width: 100%;
  height: 400px;
  margin-top: 15px;
  border-radius: 10px;
  border: none;
}
</style>
</head>

<body>

<h2>🎬 STANY MOVIE SYSTEM</h2>

<div style="text-align:center;">
  <input type="text" id="search" placeholder="Search movie...">
  <button onclick="searchMovie()">Search</button>
</div>

<div class="section">
  <h3>🔥 Trending</h3>
  <div class="movies" id="trending"></div>
</div>

<div class="section">
  <h3>🆕 New Releases</h3>
  <div class="movies" id="new"></div>
</div>

<div class="section">
  <h3>🔍 Search Results</h3>
  <div class="movies" id="results"></div>
</div>

<div class="links" id="links"></div>

<iframe id="player"></iframe>

<script>
const API_KEY = "2e211dfda888f7cc55ce433d743f9bc3";

// LOAD TRENDING
async function loadTrending() {
  const res = await fetch(`https://api.themoviedb.org/3/trending/movie/day?api_key=${API_KEY}`);
  const data = await res.json();
  showMovies(data.results, "trending");
}

// LOAD NEW MOVIES
async function loadNew() {
  const res = await fetch(`https://api.themoviedb.org/3/movie/now_playing?api_key=${API_KEY}`);
  const data = await res.json();
  showMovies(data.results, "new");
}

// SEARCH
async function searchMovie() {
  const q = document.getElementById("search").value;
  if (!q) return;

  const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${q}`);
  const data = await res.json();

  showMovies(data.results, "results");
}

// DISPLAY MOVIES
function showMovies(movies, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";

  movies.forEach(movie => {
    if (!movie.poster_path) return;

    const div = document.createElement("div");
    div.className = "movie";

    div.innerHTML = `
      <img src="https://image.tmdb.org/t/p/w500${movie.poster_path}">
      <p>${movie.title}</p>
    `;

    div.onclick = () => generateLinks(movie.id, movie.title);

    container.appendChild(div);
  });
}

// GENERATE STREAM LINKS
function generateLinks(id, title) {
  const vidsrc = `https://vidsrc.to/embed/movie/${id}`;
  const embed2 = `https://www.2embed.cc/embed/${id}`;
  const multi = `https://multiembed.mov/?video_id=${id}&tmdb=1`;

  document.getElementById("links").innerHTML = `
    <h3>${title}</h3>

    <div class="link-box">
      <b>vidsrc (HD):</b><br>${vidsrc}
      <br>
      <button onclick="play('${vidsrc}')">Play</button>
      <button onclick="copy('${vidsrc}')">Copy</button>
    </div>

    <div class="link-box">
      <b>2embed:</b><br>${embed2}
      <br>
      <button onclick="play('${embed2}')">Play</button>
      <button onclick="copy('${embed2}')">Copy</button>
    </div>

    <div class="link-box">
      <b>multiembed:</b><br>${multi}
      <br>
      <button onclick="play('${multi}')">Play</button>
      <button onclick="copy('${multi}')">Copy</button>
    </div>
  `;
}

// PLAYER
function play(url) {
  document.getElementById("player").src = url;
}

// COPY
function copy(text) {
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

// INIT
loadTrending();
loadNew();
</script>

</body>
</html>
